<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Для тебя ❤️</title>

<style>

body{
font-family:Arial;
background:#fff0f5;
text-align:center;
}

button{
background:#ff2d75;
color:white;
border:none;
padding:15px 30px;
font-size:18px;
border-radius:25px;
cursor:pointer;
margin-top:20px;
}

.section{
display:none;
}

.grid{
display:grid;
grid-template-columns:repeat(3,120px);
gap:15px;
justify-content:center;
margin-top:30px;
}

.card{
width:120px;
height:120px;
background:#ff2d75;
border-radius:15px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

.card img{
width:100%;
height:100%;
border-radius:15px;
display:none;
}

</style>
</head>

<body>

<div id="start">
<h1>Привет, любимая ❤️</h1>
<p>Я сделал это специально для тебя</p>
<button onclick="start()">Начать</button>
</div>


<div id="game1" class="section">
<h2>Мини игра 1 — Найди пары</h2>

<div class="grid" id="grid"></div>

<button onclick="next()">Далее</button>
</div>


<div id="memories" class="section">
<h2>Наши воспоминания ❤️</h2>

<img src="photo1.jpg" width="200">
<img src="photo2.jpg" width="200">
<img src="photo3.jpg" width="200">

<h3>Я тебя люблю ❤️</h3>

</div>


<script>

let images=[
"img1.jpg",
"img1.jpg",
"img2.jpg",
"img2.jpg",
"img3.jpg",
"img3.jpg"
]

images.sort(()=>0.5-Math.random())

let grid=document.getElementById("grid")

let first=null
let second=null

images.forEach(src=>{
let card=document.createElement("div")
card.className="card"

let img=document.createElement("img")
img.src=src

card.appendChild(img)

card.onclick=()=>{
img.style.display="block"

if(!first){
first=img
}else{
second=img

if(first.src!==second.src){
setTimeout(()=>{
first.style.display="none"
second.style.display="none"
first=null
second=null
},800)
}else{
first=null
second=null
}

}

}

grid.appendChild(card)

})


function start(){
document.getElementById("start").style.display="none"
document.getElementById("game1").style.display="block"
}

function next(){
document.getElementById("game1").style.display="none"
document.getElementById("memories").style.display="block"
}

</script>

</body>
</html>
